<!DOCTYPE html>
<html lang="ru">
<head><meta charset="utf-8"><title>Наряд выполнен</title></head>
<body style="font-family: Arial, sans-serif; background:#f5f5f5; margin:0; padding:20px;">
  <div style="max-width:600px; margin:auto; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.1);">
    <div style="background:#0288d1; padding:20px 24px;">
      <h1 style="color:#fff; margin:0; font-size:20px;">Наряд выполнен</h1>
    </div>
    <div style="padding:24px;">
      <p>Здравствуйте!</p>
      <p>Наряд-задание выполнен бригадой:</p>
      <table style="width:100%; border-collapse:collapse; margin:16px 0;">
        <tr><td style="padding:8px; background:#f0f4f8; font-weight:bold; width:40%;">Наряд №</td><td style="padding:8px;">{{ work_order_number }}</td></tr>
        <tr><td style="padding:8px; background:#f0f4f8; font-weight:bold;">Заявка №</td><td style="padding:8px;">{{ request_number }}</td></tr>
        <tr><td style="padding:8px; background:#f0f4f8; font-weight:bold;">Котельная</td><td style="padding:8px;">{{ boiler_name }}</td></tr>
        <tr><td style="padding:8px; background:#f0f4f8; font-weight:bold;">Бригада</td><td style="padding:8px;">{{ brigade_name }}</td></tr>
        <tr><td style="padding:8px; background:#f0f4f8; font-weight:bold;">Завершён</td><td style="padding:8px;">{{ completed_at }}</td></tr>
        {% if notes %}
        <tr><td style="padding:8px; background:#f0f4f8; font-weight:bold;">Примечания</td><td style="padding:8px;">{{ notes }}</td></tr>
        {% endif %}
      </table>
    </div>
    <div style="background:#f0f4f8; padding:12px 24px; text-align:center; color:#999; font-size:12px;">
      Котельный сервис — автоматическое уведомление
    </div>
  </div>
</body>
</html>
