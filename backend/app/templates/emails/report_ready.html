<!DOCTYPE html>
<html lang="ru">
<head><meta charset="utf-8"><title>Отчёт сформирован</title></head>
<body style="font-family: Arial, sans-serif; background:#f5f5f5; margin:0; padding:20px;">
  <div style="max-width:600px; margin:auto; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.1);">
    <div style="background:#f57c00; padding:20px 24px;">
      <h1 style="color:#fff; margin:0; font-size:20px;">Отчёт сформирован</h1>
    </div>
    <div style="padding:24px;">
      <p>Здравствуйте!</p>
      <p>Регламентный отчёт готов к отправке:</p>
      <table style="width:100%; border-collapse:collapse; margin:16px 0;">
        <tr><td style="padding:8px; background:#f0f4f8; font-weight:bold; width:40%;">Тип отчёта</td><td style="padding:8px;">{{ report_type }}</td></tr>
        <tr><td style="padding:8px; background:#f0f4f8; font-weight:bold;">Период</td><td style="padding:8px;">{{ period }}</td></tr>
        <tr><td style="padding:8px; background:#f0f4f8; font-weight:bold;">Сформирован</td><td style="padding:8px;">{{ generated_at }}</td></tr>
        <tr><td style="padding:8px; background:#f0f4f8; font-weight:bold;">Размер файла</td><td style="padding:8px;">{{ file_size }}</td></tr>
      </table>
      <p style="color:#666; font-size:13px;">Файл отчёта прикреплён к данному письму.</p>
    </div>
    <div style="background:#f0f4f8; padding:12px 24px; text-align:center; color:#999; font-size:12px;">
      Котельный сервис — автоматическое уведомление
    </div>
  </div>
</body>
</html>
